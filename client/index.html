<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Random Quote Machine</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        padding-top: 80px;
        background-color: #f0f0f0;
      }

      h1 { margin-bottom: 30px; }

      .fetch-button {
        min-width: 150px;
        margin-bottom: 30px;
        padding: 15px;
        font-size: 1em;
        border-radius: 5px;
        cursor: pointer;
        background-color: #00C78C;
        border: none;
        color: rgb(15, 66, 54);
        transition: all 0.5s;
      }

      .fetch-button:hover { background-color: rgb(40, 209, 209); }

      .quotes {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0 20px;
      }

      .quote {
        background-color: #20BF9F;
        border-radius: 5px;
        padding: 20px;
        margin: 10px;
        width: 47%;
        color: #333;
        text-align: left;
      }

      .quote h2 { margin: 0 0 10px; font-size: 1.2rem; }
      .quote h3 { margin: 0 0 15px; font-size: 1rem; opacity: 0.7; }

      .tweet-link {
        color: rgb(15, 66, 54);
        font-weight: bold;
        text-decoration: none;
      }

      .tweet-link:hover { text-decoration: underline; }

      .spinner {
        display: none;
        margin: 20px auto;
        width: 50px;
        height: 50px;
        border: 6px solid #ccc;
        border-top-color: #00BFFF;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <h1>Random Quote Machine</h1>
    <button class="fetch-button" onclick="fetchQuotes()">Get Quotes!</button>
    <div class="spinner" id="spinner"></div>
    <div class="quotes" id="quotes"></div>

    <script>
      async function fetchQuotes() {
        const spinner = document.getElementById('spinner');
        const quotesEl = document.getElementById('quotes');

        spinner.style.display = 'block';
        quotesEl.innerHTML = '';

        const response = await fetch('/api/quotes');
        const data = await response.json();

        spinner.style.display = 'none';
        quotesEl.innerHTML = data.quotes.map(({ quote, author }) => `
          <div class="quote">
            <h2>${quote}</h2>
            <h3>${author}</h3>
            <a class="tweet-link"
               href="https://twitter.com/intent/tweet?text=${encodeURIComponent(quote + ' - ' + author)}"
               target="_blank">Tweet</a>
          </div>
        `).join('');
      }
    </script>
  </body>
</html>
